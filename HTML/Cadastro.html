<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../CSS/Cadastro.css" rel="stylesheet">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="PaginaInicial.html">Inicio</a>
    <div class="ms-auto d-flex align-items-center" id="navbar-auth"></div>
  </div>
</nav>
<script>
(function() {
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || 'null');
    const el = document.getElementById('navbar-auth');
    if (usuario) {
        el.innerHTML = `<span class="navbar-text me-2">${usuario.email} (${usuario.tipo})</span>
            <button class="btn btn-outline-danger btn-sm" onclick="sessionStorage.removeItem('usuario');window.location.href='PaginaInicial.html'">Sair</button>`;
    }
})();
</script>
<nav class="navbar bg-body-tertiary">
  <form class="container-fluid justify-content-start">
    <button onclick="OnClickCadastrar()" id="cadastrar-produto" class="btn btn-outline-success me-2" type="button">Cadastrar produto</button>
    <button onclick="OnClickRemoverCadastro()" id="remover-produto" class="btn btn-sm btn-outline-secondary" type="button" >Remover produto</button>
  </form>
</nav>
<div id="cards-container" class="mt-3"></div>
<div id="remover-container" class="mt-3"></div>
<script>
    // Proteção: somente vendedores podem acessar esta página
    (function() {
        const usuario = JSON.parse(sessionStorage.getItem('usuario') || 'null');
        if (!usuario || usuario.tipo !== 'vendedor') {
            alert('Acesso restrito a vendedores. Faça login com uma conta vendedor.');
            window.location.href = 'Login.html';
        }
    })();
</script>
<script src="../JavaScript/Cadastro.js" ></script>
</body>
</html>
