<body>
<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="PaginaInicial.html">Inicio</a>
    <div class="ms-auto d-flex align-items-center" id="navbar-auth"></div>
  </div>
</nav>
<script>
(function() {
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || 'null');
    const el = document.getElementById('navbar-auth');
    if (usuario) {
        el.innerHTML = `<span class="navbar-text me-2">${usuario.email} (${usuario.tipo})</span>
            <button class="btn btn-outline-danger btn-sm" onclick="sessionStorage.removeItem('usuario');location.reload()">Sair</button>`;
    } else {
        el.innerHTML = '<a href="Login.html" class="btn btn-outline-primary btn-sm">Entrar</a>';
    }
})();
</script>

<div id="card-produto" class="mt-3 d-flex flex-wrap"></div>
