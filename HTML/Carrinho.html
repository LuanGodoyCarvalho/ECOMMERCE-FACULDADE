<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../CSS/Carrinho.css" rel="stylesheet">
    <title>Carrinho</title>
</head>
<body>
    <nav class="navbar bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="PaginaInicial.html">Inicio</a>
        <div class="ms-auto d-flex align-items-center" id="navbar-auth"></div>
      </div>
    </nav>
    <script>
    (function() {
        const usuario = JSON.parse(sessionStorage.getItem('usuario') || 'null');
        const el = document.getElementById('navbar-auth');
        const carrinhoIcon = `<a href="Carrinho.html" class="btn btn-outline-secondary btn-sm me-2 position-relative active" title="Carrinho">
            🛒
        </a>`;
        if (usuario) {
            el.innerHTML = `${carrinhoIcon}<span class="navbar-text me-2">${usuario.email} (${usuario.tipo})</span>
                <button class="btn btn-outline-danger btn-sm" onclick="sessionStorage.removeItem('usuario');location.reload()">Sair</button>`;
        } else {
            el.innerHTML = `${carrinhoIcon}<a href="Login.html" class="btn btn-outline-primary btn-sm">Entrar</a>`;
        }
    })();
    </script>

    <div class="container mt-4">
        <h2>Meu Carrinho</h2>
        <div class="row">
            <div class="col-md-8" id="carrinho-itens">
                <p>Carregando...</p>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Resumo da compra</h4>
                    <hr>
                    <p>Produtos: <span id="resumo-qtd">0</span> item(ns)</p>
                    <p>Subtotal: <strong>R$ <span id="resumo-total">0.00</span></strong></p>
                    <hr>
                    <button class="btn btn-danger btn-sm mb-2" onclick="limparCarrinho()">Limpar Carrinho</button>
                    <a href="lista.html" class="btn btn-primary">Continuar Comprando</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="../JavaScript/Carrinho.js"></script>
</body>
</html>
